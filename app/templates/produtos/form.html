{% extends 'base.html' %}
{% block title %}{{ 'Editar' if produto else 'Novo' }} Produto – PDV Materiais{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4><i class="bi bi-box-seam"></i> {{ 'Editar' if produto else 'Novo' }} Produto</h4>
  <a href="{{ url_for('produtos.index') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Voltar
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Código *</label>
          <input type="text" name="codigo" class="form-control" required maxlength="50"
                 value="{{ produto.codigo if produto else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Nome *</label>
          <input type="text" name="nome" class="form-control" required maxlength="200"
                 value="{{ produto.nome if produto else '' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label">Unidade</label>
          <select name="unidade" class="form-select">
            {% set unidades = ['UN', 'SC', 'KG', 'M', 'M²', 'M³', 'L', 'PCT', 'CX', 'RL', 'BR', 'BD'] %}
            {% for u in unidades %}
            <option value="{{ u }}" {{ 'selected' if produto and produto.unidade == u else '' }}>{{ u }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Categoria *</label>
          <select name="categoria_id" class="form-select" required>
            <option value="">Selecione...</option>
            {% for c in categorias %}
            <option value="{{ c.id }}" {{ 'selected' if produto and produto.categoria_id == c.id else '' }}>
              {{ c.nome }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Preço de Custo (R$)</label>
          <input type="number" name="preco_custo" class="form-control" step="0.01" min="0"
                 value="{{ "%.2f"|format(produto.preco_custo) if produto else '0.00' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Preço de Venda (R$)</label>
          <input type="number" name="preco_venda" class="form-control" step="0.01" min="0"
                 value="{{ "%.2f"|format(produto.preco_venda) if produto else '0.00' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Estoque Atual</label>
          <input type="number" name="estoque" class="form-control" step="0.001" min="0"
                 value="{{ "%.3f"|format(produto.estoque) if produto else '0.000' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Estoque Mínimo</label>
          <input type="number" name="estoque_minimo" class="form-control" step="0.001" min="0"
                 value="{{ "%.3f"|format(produto.estoque_minimo) if produto else '0.000' }}">
        </div>
        {% if produto %}
        <div class="col-md-4 d-flex align-items-end">
          <div class="form-check">
            <input type="checkbox" name="ativo" class="form-check-input" id="ativo"
                   {{ 'checked' if produto.ativo else '' }}>
            <label class="form-check-label" for="ativo">Produto ativo</label>
          </div>
        </div>
        {% endif %}
        <div class="col-12">
          <label class="form-label">Descrição</label>
          <textarea name="descricao" class="form-control" rows="2">{{ produto.descricao if produto else '' }}</textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Salvar
          </button>
          <a href="{{ url_for('produtos.index') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
