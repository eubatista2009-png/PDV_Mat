{% extends 'base.html' %}
{% block title %}{{ 'Editar' if cliente else 'Novo' }} Cliente – PDV Materiais{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4><i class="bi bi-person"></i> {{ 'Editar' if cliente else 'Novo' }} Cliente</h4>
  <a href="{{ url_for('clientes.index') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Voltar
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Nome *</label>
          <input type="text" name="nome" class="form-control" required maxlength="200"
                 value="{{ cliente.nome if cliente else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">CPF / CNPJ</label>
          <input type="text" name="cpf_cnpj" class="form-control" maxlength="20"
                 value="{{ cliente.cpf_cnpj if cliente else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Telefone</label>
          <input type="text" name="telefone" class="form-control" maxlength="20"
                 value="{{ cliente.telefone if cliente else '' }}">
        </div>
        <div class="col-md-8">
          <label class="form-label">E-mail</label>
          <input type="email" name="email" class="form-control" maxlength="150"
                 value="{{ cliente.email if cliente else '' }}">
        </div>
        <div class="col-md-8">
          <label class="form-label">Endereço</label>
          <input type="text" name="endereco" class="form-control" maxlength="300"
                 value="{{ cliente.endereco if cliente else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Cidade</label>
          <input type="text" name="cidade" class="form-control" maxlength="100"
                 value="{{ cliente.cidade if cliente else '' }}">
        </div>
        {% if cliente %}
        <div class="col-12">
          <div class="form-check">
            <input type="checkbox" name="ativo" class="form-check-input" id="ativo"
                   {{ 'checked' if cliente.ativo else '' }}>
            <label class="form-check-label" for="ativo">Cliente ativo</label>
          </div>
        </div>
        {% endif %}
        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Salvar
          </button>
          <a href="{{ url_for('clientes.index') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
